<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Pete | Get in Touch</title>
    <link rel="stylesheet" href="styles-pete.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <h1>Contact Pete</h1>
    
    <div class="intro-text">
        <p>Want to schedule a playdate or send Pete a digital treat? Fill out the form below!</p>
    </div>

    <section class="form-container">
        <form action="#" method="post">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" placeholder="Write your message here..." required></textarea>
            </div>
            
            <input type="submit" value="Send Message" class="btn-submit">
        </form>
    </section>

    <footer>
        <p>&copy; 2023 Pete's Adventures.</p>
    </footer>
</body>
</html>
